<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<title>iPhone Safari Video Test</title>
	<meta name="viewport" content="width=device-width, initial-scale=1" />

	<meta name="title" content="iPhone Safari Video Test">
	<meta name="description" content="Simple page to test video behaviour on iPhone Safari.">

	<meta property="og:title" content="iPhone Safari Video Test">
	<meta property="og:description" content="Simple page to test video behaviour on iPhone Safari.">
	<meta property="og:type" content="website">
	<meta property="og:url" content="https://basecamportugal.com/test-video/">

	<style>
		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			padding: 1rem;
			font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
		}

		#log {
			margin: 0 0 1.5rem 0;
			font-size: 0.875rem;
		}

		.videos-wrapper {
			display: flex;
			flex-direction: column;
			row-gap: 60px;
		}

		.video-wrapper {
			width: 90vw;
			max-width: 800px;
			margin: 0 auto;
		}

		video {
			width: 100%;
			height: auto;
			display: block;
		}
	</style>

	<script src="video-poster.js"></script>
	<script>
		document.addEventListener('DOMContentLoaded', function () {
			const video2 = document.getElementById('video2');
			const logEl  = document.getElementById('log');

			if (video2) {
				setVideoPosterFromFrame({
					video: video2,
					time: 0.5,
					log: logEl
				});
			}
		});
	</script>
</head>
<body>
	<div id="log"></div>

	<div class="videos-wrapper">
		<div class="video-wrapper">
			<video
				id="video1"
				controls
				playsinline
				webkit-playsinline
				muted
				preload="auto"
			>
				<source src="Tap_to_Pay_on_Android_With_Square_HERO_PHOTO.mp4" type="video/mp4" />
				Your browser does not support the video tag.
			</video>
		</div>

		<div class="video-wrapper">
			<video
				id="video2"
				controls
				playsinline
				webkit-playsinline
				muted
				preload="auto"
			>
				<source src="Tap_to_Pay_on_Android_With_Square_HERO_PHOTO.mp4" type="video/mp4" />
				Your browser does not support the video tag.
			</video>
		</div>
	</div>
</body>
</html>
